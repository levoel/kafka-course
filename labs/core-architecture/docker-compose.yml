# Kafka 4.0 KRaft mode — единственный поддерживаемый режим в Kafka 4.0+
# KRaft (Kafka Raft) is the only supported mode in Kafka 4.0+
# Запуск: docker compose up -d
# Остановка: docker compose down -v

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka-lab
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/kafka/logs
    volumes:
      - kafka-data:/var/kafka/logs
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  lab:
    build: .
    container_name: kafka-lab-python
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./exercises:/app/exercises
    working_dir: /app
    command: ["bash"]
    stdin_open: true
    tty: true

volumes:
  kafka-data:
