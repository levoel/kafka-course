# Kafka 4.0 KRaft + Kafka Connect (distributed) + Schema Registry 7.9
# Режим KRaft — единственный поддерживаемый в Kafka 4.0+. Внешний координатор не нужен.
#
# Запуск: docker compose up -d
# Проверка готовности:
#   curl http://localhost:8083/connectors   # должен вернуть []
#   curl http://localhost:8081/subjects     # должен вернуть []
# Остановка: docker compose down -v

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka-connect-lab
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT — для клиентов (продюсеры, консьюмеры, Connect worker, Schema Registry)
      # CONTROLLER — для внутренней Raft-коммуникации между брокерами
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # Connect worker и Schema Registry обращаются к брокеру по имени сервиса 'kafka'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      # Единственный KRaft voter — этот же узел (nodeId=1, хост kafka, порт 9093)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Replication factor для внутренних топиков Connect (одноброкерный кластер)
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/kafka/logs
    volumes:
      - kafka-data:/var/kafka/logs
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    container_name: schema-registry-lab
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      # Schema Registry хранит схемы в топике _schemas на брокере kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      # BACKWARD — режим совместимости по умолчанию:
      # новая схема должна уметь читать данные, записанные старой схемой
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  connect:
    image: confluentinc/cp-kafka-connect:7.9.0
    container_name: kafka-connect-lab-worker
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      # Все worker с одинаковым group.id образуют один Connect-кластер
      CONNECT_GROUP_ID: connect-lab-group
      # Внутренние топики Connect для хранения конфигураций, офсетов и статусов
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      # Replication factor = 1 для однонодового лаборатор. кластера
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Конвертер ключей: StringConverter — ключ сообщения передаётся как строка
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      # Конвертер значений: AvroConverter — значение сериализуется через Schema Registry
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      # Пути поиска плагинов коннекторов
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    volumes:
      # Монтируем директорию test-data внутрь контейнера Connect
      # FileSource коннектор читает из /tmp/test-data/input.txt
      # JDBC Sink коннектор пишет в /tmp/test-data/output.db
      - ./test-data:/tmp/test-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  kafka-data:
