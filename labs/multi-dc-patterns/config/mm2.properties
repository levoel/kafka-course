# MirrorMaker 2 -- Active-Passive репликация: DC-1 -> DC-2
#
# Данный файл настраивает MirrorMaker 2 в standalone режиме:
#   - Три коннектора MM2: MirrorSourceConnector (данные), MirrorCheckpointConnector (офсеты),
#     MirrorHeartbeatConnector (мониторинг)
#   - Однонаправленная репликация: dc1 -> dc2 (active-passive)
#   - Синхронизация consumer group offsets для автоматического failover
#
# Итоговая конфигурация: минималистичная, но production-корректная

# Алиасы кластеров
clusters = dc1, dc2

# Адреса bootstrap-серверов (используются Docker DNS-имена контейнеров)
dc1.bootstrap.servers = kafka-dc1:9092
dc2.bootstrap.servers = kafka-dc2:9092

# Включить репликацию DC-1 -> DC-2
# Паттерн .* реплицирует все топики (кроме внутренних MM2)
dc1->dc2.enabled = true
dc1->dc2.topics = .*
dc1->dc2.groups = .*

# Выключить обратную репликацию (это active-passive, не active-active)
# При активации было бы: dc2->dc1.enabled = true
dc2->dc1.enabled = false

# -------------------------------------------------------------------
# MirrorCheckpointConnector: синхронизация consumer group offsets
# -------------------------------------------------------------------
# emit.checkpoints: записывает маппинг офсетов dc1 -> dc2 каждые N секунд
# в топик dc1.checkpoints.internal на кластере dc2
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 10

# sync.group.offsets: автоматически коммитит переведённые офсеты
# в consumer groups на dc2. При failover консьюмеры на dc2 продолжают
# с правильного места без ручного перевода офсетов.
sync.group.offsets.enabled = true
sync.group.offsets.interval.seconds = 10

# -------------------------------------------------------------------
# MirrorHeartbeatConnector: мониторинг здоровья репликации
# -------------------------------------------------------------------
# Записывает heartbeat-записи в топик heartbeats каждые N секунд.
# Потребитель на dc2, читающий heartbeats, видит задержку репликации.
# Алерт: если heartbeat_age > 30 секунд -- репликация остановилась.
emit.heartbeats.enabled = true
emit.heartbeats.interval.seconds = 5

# -------------------------------------------------------------------
# Политика именования реплицированных топиков
# -------------------------------------------------------------------
# DefaultReplicationPolicy: топики появляются на dc2 с префиксом источника.
# Пример: orders.order.created -> dc1.orders.order.created
#
# Альтернатива IdentityReplicationPolicy (для active-active):
#   orders.order.created -> orders.order.created (без префикса)
#   Требует явного исключения MM2-internal топиков из репликации.
replication.policy.class = org.apache.kafka.connect.mirror.DefaultReplicationPolicy

# -------------------------------------------------------------------
# Connect worker конфигурация (для standalone режима)
# -------------------------------------------------------------------
# В standalone режиме connect-mirror-maker.sh создаёт internal topics
# для хранения состояния коннекторов. RF=1 для одноброкерного стенда.
offset.storage.replication.factor = 1
config.storage.replication.factor = 1
status.storage.replication.factor = 1

# Количество задач репликации (один per partition group при малой нагрузке)
tasks.max = 2
